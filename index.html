<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>万能ファイル変換ツール</title>
  
  <!-- スタイル設定 (Tailwind CSS) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <!-- 変換ライブラリの読み込み -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .loader { border-top-color: #3b82f6; animation: spinner 0.6s linear infinite; }
    @keyframes spinner { to { transform: rotate(360deg); } }
    .drop-zone.active { border-color: #3b82f6; background-color: #eff6ff; }
  </style>
</head>
<body class="p-4 md:p-10">

  <div class="max-w-4xl mx-auto">
    <header class="text-center mb-10">
      <h1 class="text-4xl font-extrabold text-slate-900 mb-2">万能ファイル変換ツール</h1>
      <p class="text-slate-500">ブラウザ内で安全に変換。iPadOS対応・一括コピー機能付き</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <!-- 左側：ツール選択 -->
      <div class="space-y-2">
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 ml-2">変換モード</p>
        <div id="tool-list" class="space-y-2">
          <!-- JSで動的に生成 -->
        </div>
      </div>

      <!-- 右側：メイン操作 -->
      <div class="md:col-span-2 bg-white rounded-3xl shadow-xl p-6 md:p-8 border border-slate-100">
        <div id="tool-header" class="mb-6">
          <h2 id="active-tool-name" class="text-2xl font-bold text-slate-800">TXTからPDF</h2>
          <p id="active-tool-desc" class="text-slate-400 text-sm">対応: .txt</p>
        </div>

        <!-- 画像の向き設定 (画像変換時のみ表示) -->
        <div id="orientation-options" class="hidden mb-6 p-4 bg-slate-50 rounded-2xl flex items-center gap-4">
          <span class="text-sm font-bold text-slate-500">向き:</span>
          <div class="flex gap-2">
            <button onclick="setOrientation('auto')" id="opt-auto" class="px-4 py-2 rounded-xl text-sm font-bold bg-blue-600 text-white shadow-md">自動</button>
            <button onclick="setOrientation('p')" id="opt-p" class="px-4 py-2 rounded-xl text-sm font-bold bg-white text-slate-600 border">縦</button>
            <button onclick="setOrientation('l')" id="opt-l" class="px-4 py-2 rounded-xl text-sm font-bold bg-white text-slate-600 border">横</button>
          </div>
        </div>

        <!-- ファイル選択エリア -->
        <div id="drop-zone" class="border-2 border-dashed border-slate-200 rounded-3xl p-10 text-center bg-slate-50 hover:bg-slate-100 transition-all cursor-pointer relative">
          <input type="file" id="file-input" class="absolute inset-0 opacity-0 cursor-pointer">
          <div id="file-info-empty">
            <div class="text-slate-300 mb-4 flex justify-center">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            </div>
            <p class="font-bold text-slate-600">ファイルを選択またはドラッグ</p>
          </div>
          <div id="file-info-selected" class="hidden text-blue-600">
            <div class="mb-4 flex justify-center">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
            </div>
            <p id="selected-file-name" class="font-bold text-xl truncate px-4"></p>
            <p id="selected-file-size" class="text-sm opacity-60 mt-1"></p>
          </div>
        </div>

        <button id="convert-btn" disabled class="w-full mt-8 py-4 bg-slate-100 text-slate-300 rounded-2xl font-bold text-xl transition-all flex items-center justify-center gap-3">
          変換を実行
        </button>
      </div>
    </div>
  </div>

  <!-- 完了モーダル -->
  <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-6">
    <div class="bg-white rounded-[2.5rem] p-8 md:p-10 max-w-md w-full shadow-2xl text-center">
      <div class="w-20 h-20 bg-green-50 text-green-500 rounded-3xl flex items-center justify-center mx-auto mb-6">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h3 class="text-2xl font-bold text-slate-900 mb-2">変換完了！</h3>
      <p class="text-slate-500 mb-6">ファイルが作成されました。</p>

      <!-- テキストコピーエリア (PDF2TXT時のみ) -->
      <div id="text-result-area" class="hidden mb-6">
        <div class="bg-slate-50 p-4 rounded-2xl text-left max-h-40 overflow-y-auto mb-4 border text-xs font-mono text-slate-600 whitespace-pre-wrap" id="text-preview"></div>
        <button onclick="copyExtractedText()" class="w-full py-3 bg-emerald-50 text-emerald-600 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-emerald-100 transition-all">
          テキストを一括コピー
        </button>
      </div>

      <div class="space-y-3">
        <button id="download-manual-btn" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-lg shadow-lg shadow-blue-100 flex items-center justify-center gap-2">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          ダウンロード
        </button>
        <button onclick="closeModal()" class="w-full py-4 bg-slate-50 text-slate-600 rounded-2xl font-bold text-lg">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    // PDF.js設定
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const tools = [
      { id: 'txt2pdf', name: 'TXTからPDF', accept: '.txt', group: 'forward' },
      { id: 'img2pdf', name: '画像からPDF', accept: 'image/*', group: 'forward' },
      { id: 'pdf2pptx', name: 'PDFからPPTX', accept: '.pdf', group: 'forward' },
      { id: 'video2mp3', name: '動画からMP3', accept: 'video/*', group: 'forward' },
      { id: 'pdf2txt', name: 'PDFからTXT', accept: '.pdf', group: 'reverse' },
      { id: 'pdf2img', name: 'PDFから画像', accept: '.pdf', group: 'reverse' }
    ];

    let activeTool = 'txt2pdf';
    let selectedFile = null;
    let generatedBlob = null;
    let generatedName = "";
    let extractedText = "";
    let imgOrientation = 'auto';

    // UI初期化
    const toolList = document.getElementById('tool-list');
    tools.forEach(t => {
      const btn = document.createElement('button');
      btn.id = `btn-${t.id}`;
      btn.className = `flex items-center w-full p-4 rounded-2xl transition-all border text-left font-bold ${t.id === activeTool ? 'bg-blue-600 text-white shadow-lg border-blue-600' : 'bg-white text-slate-600 border-slate-100 hover:bg-slate-50'}`;
      btn.innerHTML = `<span>${t.name}</span>`;
      btn.onclick = () => selectTool(t.id);
      toolList.appendChild(btn);
    });

    function selectTool(id) {
      activeTool = id;
      selectedFile = null;
      document.getElementById('file-input').value = '';
      updateUI();
    }

    function updateUI() {
      const tool = tools.find(t => t.id === activeTool);
      document.getElementById('active-tool-name').innerText = tool.name;
      document.getElementById('active-tool-desc').innerText = `対応: ${tool.accept}`;
      
      // ボタンのスタイル更新
      tools.forEach(t => {
        const btn = document.getElementById(`btn-${t.id}`);
        const isActive = t.id === activeTool;
        const color = t.group === 'forward' ? 'blue' : 'purple';
        btn.className = `flex items-center w-full p-4 rounded-2xl transition-all border text-left font-bold ${isActive ? `bg-${color}-600 text-white shadow-lg border-${color}-600` : 'bg-white text-slate-600 border-slate-100 hover:bg-slate-50'}`;
      });

      // 画像オプションの表示切り替え
      document.getElementById('orientation-options').classList.toggle('hidden', activeTool !== 'img2pdf');
      
      // ファイル情報の表示
      if (selectedFile) {
        document.getElementById('file-info-empty').classList.add('hidden');
        document.getElementById('file-info-selected').classList.remove('hidden');
        document.getElementById('selected-file-name').innerText = selectedFile.name;
        document.getElementById('selected-file-size').innerText = (selectedFile.size / 1024 / 1024).toFixed(2) + ' MB';
        document.getElementById('convert-btn').disabled = false;
        document.getElementById('convert-btn').className = `w-full mt-8 py-4 rounded-2xl font-bold text-xl transition-all flex items-center justify-center gap-3 text-white shadow-lg ${tool.group === 'forward' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-purple-600 hover:bg-purple-700'}`;
      } else {
        document.getElementById('file-info-empty').classList.remove('hidden');
        document.getElementById('file-info-selected').classList.add('hidden');
        document.getElementById('convert-btn').disabled = true;
        document.getElementById('convert-btn').className = "w-full mt-8 py-4 bg-slate-100 text-slate-300 rounded-2xl font-bold text-xl flex items-center justify-center gap-3";
      }
    }

    function setOrientation(o) {
      imgOrientation = o;
      ['auto', 'p', 'l'].forEach(opt => {
        const btn = document.getElementById(`opt-${opt}`);
        if (opt === o) {
          btn.className = "px-4 py-2 rounded-xl text-sm font-bold bg-blue-600 text-white shadow-md";
        } else {
          btn.className = "px-4 py-2 rounded-xl text-sm font-bold bg-white text-slate-600 border";
        }
      });
    }

    document.getElementById('file-input').onchange = (e) => {
      if (e.target.files.length > 0) {
        selectedFile = e.target.files[0];
        updateUI();
      }
    };

    // 変換実行
    document.getElementById('convert-btn').onclick = async () => {
      if (!selectedFile) return;
      const btn = document.getElementById('convert-btn');
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<div class="loader w-6 h-6 border-4 border-white rounded-full"></div> 処理中...';

      try {
        const { jsPDF } = window.jspdf;
        
        if (activeTool === 'txt2pdf') {
          const text = await selectedFile.text();
          const doc = new jsPDF();
          const lines = doc.splitTextToSize(text, 180);
          let y = 15;
          lines.forEach(line => {
            if (y > 280) { doc.addPage(); y = 15; }
            doc.text(line, 15, y); y += 7;
          });
          generatedBlob = doc.output('blob');
          generatedName = selectedFile.name.replace(/\.[^/.]+$/, "") + ".pdf";
        } 
        else if (activeTool === 'img2pdf') {
          const imgUrl = URL.createObjectURL(selectedFile);
          const img = new Image();
          img.src = imgUrl;
          await new Promise((res) => img.onload = res);
          const wPt = img.naturalWidth * 0.75, hPt = img.naturalHeight * 0.75;
          let orient = wPt > hPt ? 'l' : 'p';
          if (imgOrientation === 'p') orient = 'p';
          if (imgOrientation === 'l') orient = 'l';
          const doc = new jsPDF({ orientation: orient, unit: 'pt', format: [wPt, hPt] });
          doc.addImage(img, 'JPEG', 0, 0, wPt, hPt);
          generatedBlob = doc.output('blob');
          generatedName = selectedFile.name.replace(/\.[^/.]+$/, "") + ".pdf";
          URL.revokeObjectURL(imgUrl);
        }
        else if (activeTool === 'pdf2txt') {
          const buffer = await selectedFile.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
          extractedText = "";
          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            extractedText += content.items.map(item => item.str).join(" ") + "\n\n";
          }
          generatedBlob = new Blob([extractedText], { type: 'text/plain' });
          generatedName = selectedFile.name.replace(/\.[^/.]+$/, "") + ".txt";
          document.getElementById('text-result-area').classList.remove('hidden');
          document.getElementById('text-preview').innerText = extractedText.substring(0, 1000) + "...";
        }
        else if (activeTool === 'pdf2pptx') {
          const buffer = await selectedFile.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
          const pres = new PptxGenJS();
          const firstPage = await pdf.getPage(1);
          const firstView = firstPage.getViewport({ scale: 1 });
          pres.defineLayout({ name: 'PDF', width: firstView.width / 72, height: firstView.height / 72 });
          pres.layout = 'PDF';
          for (let i = 1; i <= Math.min(pdf.numPages, 30); i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 2 });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width; canvas.height = viewport.height;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            pres.addSlide().addImage({ data: canvas.toDataURL('image/jpeg', 0.8), x: 0, y: 0, w: '100%', h: '100%' });
          }
          generatedName = selectedFile.name.replace(/\.[^/.]+$/, "") + ".pptx";
          await pres.writeFile({ fileName: generatedName });
          // PPTXは保存後にBlobを取得するのが難しいため、手動DLボタンは無効化
          document.getElementById('download-manual-btn').classList.add('hidden');
        }
        else if (activeTool === 'video2mp3') {
          const ctx = new AudioContext();
          const buffer = await ctx.decodeAudioData(await selectedFile.arrayBuffer());
          generatedBlob = bufferToWav(buffer);
          generatedName = selectedFile.name.replace(/\.[^/.]+$/, "") + ".wav";
        }

        if (generatedBlob && activeTool !== 'pdf2pptx') {
          downloadBlob(generatedBlob, generatedName);
          document.getElementById('download-manual-btn').classList.remove('hidden');
        }
        
        document.getElementById('modal').classList.remove('hidden');
      } catch (err) {
        alert("エラーが発生しました: " + err.message);
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    };

    function copyExtractedText() {
      navigator.clipboard.writeText(extractedText);
      alert("テキストをコピーしました！");
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('text-result-area').classList.add('hidden');
      selectedFile = null;
      updateUI();
    }

    document.getElementById('download-manual-btn').onclick = () => {
      if (generatedBlob) downloadBlob(generatedBlob, generatedName);
    };

    function bufferToWav(abuffer) {
      const numOfChan = abuffer.numberOfChannels, length = abuffer.length * numOfChan * 2 + 44, buffer = new ArrayBuffer(length), view = new DataView(buffer);
      let pos = 0;
      const set32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
      const set16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
      set32(0x46464952); set32(length - 8); set32(0x45564157); set32(0x20746d66); set32(16); set16(1); set16(numOfChan); set32(abuffer.sampleRate); set32(abuffer.sampleRate * 2 * numOfChan); set16(numOfChan * 2); set16(16); set32(0x61746164); set32(length - pos - 4);
      for (let i = 0; i < abuffer.length; i++) {
        for (let c = 0; c < numOfChan; c++) {
          let s = Math.max(-1, Math.min(1, abuffer.getChannelData(c)[i]));
          view.setInt16(pos, s < 0 ? s * 32768 : s * 32767, true); pos += 2;
        }
      }
      return new Blob([buffer], { type: "audio/wav" });
    }

    updateUI();
  </script>
</body>
</html>
